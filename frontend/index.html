<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maestrle</title>
    <!-- Prevent flash of wrong theme before React loads -->
    <script>
      (function () {
        const mode = localStorage.getItem('theme-mode');
        const name = localStorage.getItem('theme-name') || 'gold';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = mode ? mode === 'dark' : prefersDark;

        const themes = {
          gold: {
            light:  { canvas:'#faf6f0', surface:'#ffffff', 'surface-warm':'#f5ede3', ink:'#1c1410', 'ink-muted':'#6b5e55', 'ink-subtle':'#9e9490', primary:'#c9a84c', 'primary-hover':'#b8943a', 'primary-text':'#ffffff', border:'#e8e0d5', 'border-hover':'#c4b4a4' },
            dark:   { canvas:'#141210', surface:'#1e1c18', 'surface-warm':'#252018', ink:'#f0e8d8', 'ink-muted':'#a89f8c', 'ink-subtle':'#6b6258', primary:'#c9a84c', 'primary-hover':'#b8943a', 'primary-text':'#1a1210', border:'#2e2920', 'border-hover':'#403830' },
          },
          blue: {
            light:  { canvas:'#f3f5f8', surface:'#ffffff', 'surface-warm':'#eaeff5', ink:'#1a1e2a', 'ink-muted':'#5a6070', 'ink-subtle':'#9098a8', primary:'#3b5b99', 'primary-hover':'#2d4780', 'primary-text':'#ffffff', border:'#d8dde8', 'border-hover':'#b0b8c8' },
            dark:   { canvas:'#0f1219', surface:'#161b26', 'surface-warm':'#1c2333', ink:'#e0e8f5', 'ink-muted':'#8898b8', 'ink-subtle':'#546080', primary:'#5b7ec5', 'primary-hover':'#4a6ab0', 'primary-text':'#ffffff', border:'#1e2840', 'border-hover':'#2a3858' },
          },
          orange: {
            light:  { canvas:'#faf5f0', surface:'#ffffff', 'surface-warm':'#f5ebe0', ink:'#1e1a14', 'ink-muted':'#6b6050', 'ink-subtle':'#a09888', primary:'#b8723a', 'primary-hover':'#9e5f2e', 'primary-text':'#ffffff', border:'#e8ddd0', 'border-hover':'#c8b8a0' },
            dark:   { canvas:'#141008', surface:'#1e1a12', 'surface-warm':'#252018', ink:'#f0e8d8', 'ink-muted':'#a89878', 'ink-subtle':'#6b6048', primary:'#c07840', 'primary-hover':'#a86030', 'primary-text':'#ffffff', border:'#2e2418', 'border-hover':'#403020' },
          },
          red: {
            light:  { canvas:'#faf6f0', surface:'#ffffff', 'surface-warm':'#f9eeee', ink:'#1c1410', 'ink-muted':'#6b5e55', 'ink-subtle':'#9e9490', primary:'#7c3238', 'primary-hover':'#641e24', 'primary-text':'#ffffff', border:'#e8e0d5', 'border-hover':'#c4b4a4' },
            dark:   { canvas:'#130e0e', surface:'#1e1515', 'surface-warm':'#251a1a', ink:'#f0e8e8', 'ink-muted':'#a89090', 'ink-subtle':'#6b5858', primary:'#a04048', 'primary-hover':'#8b3038', 'primary-text':'#ffffff', border:'#2e2020', 'border-hover':'#403030' },
          },
        };

        const theme = themes[name] || themes.gold;
        const tokens = isDark ? theme.dark : theme.light;
        const root = document.documentElement;
        for (const [key, value] of Object.entries(tokens)) {
          root.style.setProperty('--color-' + key, value);
        }
        root.classList.toggle('dark', isDark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
